    mobile device, using round-trip wireless timing between vehicles and commodity
    pedestrian devices to admit moving devices and reject static (likely remote) malicious
    ones. Verification runs in under 8 seconds with an 8.5% Equal Error Rate in regular
    road environments. (* Equal contribution by Yang and Lee.)

