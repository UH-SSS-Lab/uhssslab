      booktitle = {IEEE International Conference on Intelligent Mobile Computing (IMC)},
      year      = {2025}
    }
  abstract: >-
    PARAVIRT is a userland containerization framework for mobile operating systems that
    isolates applications inside a standard runtime environment without requiring root
    privileges. An optimized paravirtualization-inspired syscall interface yields up to
    2.5x faster disk writes and 4 to 5.9x higher network throughput than User Mode Linux,
    approaching the performance of full virtualization platforms.

- title: "TPKey: Using TPMS Signals for Secure and Usable Intra-Vehicle Device Authentication"
  authors: "<strong>Omar Achkar</strong>, <strong>Larry Nissen</strong>, <strong>Shahryar Raza</strong>, Rushikesh Shirsat, Neil Klingensmith, George Zouridakis, <strong>Kyu In Lee</strong>"
  venue: IEEE International Conference on Cyber Security and Resilience (CSR)
  year: 2025
  themes: [vehicles]
  figure: /assets/img/pubs/25_TPKey_CSR.png
  pdf: /papers_pdf/25_TPKey_CSR.pdf
  doi: "https://ieeexplore.ieee.org/document/11130079"
  dataset: ""
  bibtex: |
    @inproceedings{tpkey2025,
      title     = {TPKey: Using TPMS Signals for Secure and Usable Intra-Vehicle Device Authentication},
      author    = {Achkar, Omar and Nissen, Larry and Raza, Shahryar and Shirsat, Rushikesh and Klingensmith, Neil and Zouridakis, George and Lee, Kyu In},
      booktitle = {IEEE International Conference on Cyber Security and Resilience (CSR)},
      year      = {2025}
    }
  abstract: >-
    TPKEY is a zero-involvement authentication protocol that extracts high-entropy keys
    from a vehicle's tire-pressure-monitoring-system (TPMS) RF signals, accessible only
    inside the cabin. It achieves 100% authentication success on legitimate devices, 0%
    false acceptance against adversaries, and 1.3-second key generation across varied
    driving conditions.

- title: "Not-so-Secret Authentication: The SyncBleed Attacks and Defenses for Zero-Involvement Authentication Systems"
  authors: "Isaac Ahlgren, Rushikesh Shirsat, <strong>Omar Achkar</strong>, George K. Thiruvathukal, <strong>Kyu In Lee</strong>, Neil Klingensmith"
  venue: IEEE International Conference on Cyber Security and Resilience (CSR)
  year: 2025
  themes: [iot]
  figure: /assets/img/pubs/25_Syncbleed_CSR.png
  pdf: /papers_pdf/25_Syncbleed_CSR.pdf
  doi: "https://ieeexplore.ieee.org/document/11130070"
  dataset: ""
  bibtex: |
    @inproceedings{syncbleed2025,
      title     = {Not-so-Secret Authentication: The SyncBleed Attacks and Defenses for Zero-Involvement Authentication Systems},
      author    = {Ahlgren, Isaac and Shirsat, Rushikesh and Achkar, Omar and Thiruvathukal, George K. and Lee, Kyu In and Klingensmith, Neil},
      booktitle = {IEEE International Conference on Cyber Security and Resilience (CSR)},
      year      = {2025}
    }
  abstract: >-
    Identifies SyncBleed, a passive attack on zero-involvement authentication systems that
    exploits synchronization messages exchanged over public wireless channels, recovering
    ~50% of generated keys in under one second. Introduces TREVOR (Time-shift REsistant
    VEctor ExtractOR), which produces nearly identical bit sequences from environmental
    signals with no synchronization exchange and 90-95% bit agreement, fully resisting
    SyncBleed.

