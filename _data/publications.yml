- title: "PARAVIRT: Userland Containers for Mobile Systems"
  authors: "Isaac Ahlgren, Yasin N. Silva, Eric Chan-Tin, George K. Thiruvathukal, <strong>Kyu In Lee</strong>, Neil Klingensmith"
  venue: IEEE International Conference on Intelligent Mobile Computing (IMC)
  year: 2025
  themes: [mobile-wearable]
  figure: /assets/img/pubs/25_Paravirt_IMC.png
  pdf: /papers_pdf/25_Paravirt_IMC.pdf
