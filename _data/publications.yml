  abstract: >-
    SyncVibe is an out-of-band pairing channel that uses a phone's vibration motor and
    accelerometer to transmit pairing data through direct device contact. A vibration
    clock-recovery technique maintains synchronization across varied noise and transmission
    media, enabling fast, secure, high-bandwidth pairing without manual passkey entry.
