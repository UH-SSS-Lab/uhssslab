    unique secrets from ambient electromagnetic radiation, allowing co-located low-cost MCU
    devices to autonomously establish a shared symmetric key with no user involvement.
    Real-world experiments report equal-error rates of 3.4% or below and authentication
    times as low as 24 seconds.

