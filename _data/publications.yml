    and authentication (ZIPA) system, exploiting environmental signal leakage from
    unsecured spaces into secured ones. The attacker's keys at 95 dBA fall within the
    standard error of the legitimate device, breaking the implicit physical-isolation
    assumption of popular ZIPA algorithms.

