- title: "SyncVibe: Fast and Secure Device Pairing through Physical Vibration on Commodity Smartphones"
  authors: "<strong>Kyuin Lee</strong>, Vijay Raghunathan, Anand Raghunathan, Younghyun Kim"
  venue: IEEE International Conference on Computer Design (ICCD)
  year: 2018
  themes: [mobile-wearable]
  figure: /assets/img/pubs/18_SyncVibe_ICCD.png
  pdf: /papers_pdf/18_SyncVibe_ICCD.pdf
  doi: "https://ieeexplore.ieee.org/document/8615693"
  dataset: ""
  bibtex: |
    @inproceedings{syncvibe2018,
      title     = {SyncVibe: Fast and Secure Device Pairing through Physical Vibration on Commodity Smartphones},
      author    = {Lee, Kyuin and Raghunathan, Vijay and Raghunathan, Anand and Kim, Younghyun},
      booktitle = {IEEE International Conference on Computer Design (ICCD)},
      pages     = {234--241},
      year      = {2018}
