# ===== 2026 =====

- title: "ACTAUTH: Interaction-Triggered, Continuous User Authentication for Controller-Free Virtual Reality"
  authors: "<strong>Haoran Li</strong>, <strong>Omar Achkar</strong>, George Zouridakis, Xin Fu, <strong>Kyu In Lee</strong>"
  venue: Accepted in IEEE International Conference on Cyber Security and Resilience (CSR)
  year: 2026
  themes: [vr-xr, mobile-wearable]
  figure: /assets/img/pubs/26_actauth_csr.png
  pdf: ""
  doi: ""
  dataset: ""
  bibtex: |
    @inproceedings{actauth2026,
      title     = {ACTAUTH: Interaction-Triggered, Continuous User Authentication for Controller-Free Virtual Reality},
      author    = {Li, Haoran and Achkar, Omar and Zouridakis, George and Fu, Xin and Lee, Kyu In},
      booktitle = {IEEE International Conference on Cyber Security and Resilience (CSR)},
      year      = {2026},
      note      = {To appear}
    }
  abstract: >-
    ACTAUTH is a controller-free continuous user authentication framework for shared
    VR headsets that recognizes users from natural hand-object interactions on
    headset-native hand tracking, no controllers or external sensors required. Using
    grab-and-release events as decision units, a proof-of-concept on Meta Quest 3S
    achieves 94.32% true-acceptance at 2% FAR (0.09% EER) and detects 100% of simulated
    session takeovers within a single imposter interaction.

- title: "Securing the Lifeline: Enforcing Read and Write Access Control in Vehicular Safety Services"
  authors: "<strong>Muhammad Baqer Mollah</strong>, George Zouridakis, <strong>Kyu In Lee</strong>"
  venue: Accepted in IEEE International Conference on Cyber Security and Resilience (CSR)
  year: 2026
  themes: [vehicles]
  figure: /assets/img/pubs/26_securing_CSR.png
  pdf: ""
  doi: ""
  dataset: ""
  bibtex: |
    @inproceedings{lifeline2026,
      title     = {Securing the Lifeline: Enforcing Read and Write Access Control in Vehicular Safety Services},
      author    = {Mollah, Muhammad Baqer and Zouridakis, George and Lee, Kyu In},
      booktitle = {IEEE International Conference on Cyber Security and Resilience (CSR)},
      year      = {2026},
      note      = {To appear}
    }
  abstract: >-
    A security mechanism for Internet-of-Vehicles (IoV) safety services that uses access
    control encryption to enforce both read (decrypt) and write (encrypt) policies on
    safety messages, going beyond traditional authentication/integrity to support
    fine-grained, contextual access by vehicle role, trust level, or proximity.
    Evaluation shows reasonable computational overhead, making the scheme practical for
    vehicular safety applications.

