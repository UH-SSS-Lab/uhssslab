---
layout: default
---
<article class="post container">
  <header class="page-header">
    <p class="post-date">{{ page.date | date: "%B %-d, %Y" }}</p>
    <h1>{{ page.title }}</h1>
  </header>
  <div class="page-content">
    {{ content }}
  </div>
  <p class="post-back"><a href="{{ '/news/' | relative_url }}">&larr; All news</a></p>
</article>
